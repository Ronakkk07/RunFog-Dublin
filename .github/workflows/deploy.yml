# .github/workflows/deploy.yml
#
# CI/CD pipeline for RunFog Dublin
#
# On every push to main:
#   1. Run tests
#   2. Deploy to Elastic Beanstalk (migrations run automatically via .ebextensions)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID       - from your AWS Academy session credentials
#   AWS_SECRET_ACCESS_KEY   - from your AWS Academy session credentials
#   AWS_SESSION_TOKEN       - from your AWS Academy session credentials (Academy labs need this)
#   EB_APP_NAME             - your EB application name (e.g. runfog-app)
#   EB_ENV_NAME             - your EB environment name (e.g. runfog-prod)

name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: "ci-test-key-not-real"
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          RUNNERHUB_QUEUE_BACKEND: "sqs"
          RUNNERHUB_BACKEND_INGEST_TOKEN: "ci-token"
          SQLITE_PATH: ":memory:"
        run: |
          python manage.py migrate --noinput
          python manage.py test tests/ --verbosity=2

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Set up Python (for EB CLI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install EB CLI
        run: pip install awsebcli

      - name: Create deployment package
        run: |
          # Zip everything except what's in .gitignore / .dockerignore
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "db.sqlite3" \
            --exclude "staticfiles/*" \
            --exclude ".env" \
            --exclude "*.env.*" \
            --exclude ".pytest_cache/*"

      - name: Deploy to EB
        run: |
          eb init ${{ secrets.EB_APP_NAME }} \
            --platform docker \
            --region us-east-1
          eb deploy ${{ secrets.EB_ENV_NAME }} \
            --staged \
            --label "deploy-${{ github.sha }}" \
            --timeout 20

      - name: Verify deployment health
        run: |
          sleep 30
          eb health ${{ secrets.EB_ENV_NAME }}