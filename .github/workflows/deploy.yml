# .github/workflows/deploy.yml
#
# CI/CD pipeline for RunFog Dublin
#
# On every push to main:
#   1. Run tests
#   2. Deploy to Elastic Beanstalk
#
# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID       - IAM access key for GitHub Actions
#   AWS_SECRET_ACCESS_KEY   - IAM secret key for GitHub Actions
#   EB_APP_NAME             - your EB application name (e.g. main)
#   EB_ENV_NAME             - your EB environment name (e.g. runfog-prod)

name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect static files
        env:
          DJANGO_SECRET_KEY: "ci-test-key-not-real"
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          RUNNERHUB_QUEUE_BACKEND: "inline"
          RUNNERHUB_BACKEND_INGEST_TOKEN: "ci-token"
          SQLITE_PATH: ":memory:"
        run: python manage.py collectstatic --noinput

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: "ci-test-key-not-real"
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          RUNNERHUB_QUEUE_BACKEND: "inline"
          RUNNERHUB_BACKEND_INGEST_TOKEN: "ci-token"
          SQLITE_PATH: ":memory:"
        run: |
          python manage.py migrate --noinput
          python manage.py test tests/ --verbosity=2

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install EB CLI
        run: pip install awsebcli

      - name: Deploy to Elastic Beanstalk
        env:
          EB_VERSION_LABEL: deploy-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
        run: |
          eb init ${{ secrets.EB_APP_NAME }} \
            --platform Docker \
            --region us-east-1
          eb deploy ${{ secrets.EB_ENV_NAME }} \
            --staged \
            --label "${EB_VERSION_LABEL}" \
            --timeout 20

      - name: Verify deployment health
        run: |
          sleep 30
          eb health ${{ secrets.EB_ENV_NAME }}

      - name: Verify live health endpoint
        run: |
          ENV_URL=$(aws elasticbeanstalk describe-environments \
            --application-name "${{ secrets.EB_APP_NAME }}" \
            --environment-names "${{ secrets.EB_ENV_NAME }}" \
            --query "Environments[0].CNAME" \
            --output text)
          curl --fail --silent --show-error "http://${ENV_URL}/health/"
